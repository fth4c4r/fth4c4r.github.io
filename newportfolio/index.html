<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial}
header{text-align:center;padding:80px 20px}
h1{color:#38bdf8}
#projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:30px;
}
.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{
padding:15px;
}
</style>
</head>
